.view-screen { display: none; height: 100vh; overflow-y: auto; padding: 20px; box-sizing: border-box; }
.view-screen.active { display: block; }
@keyframes slideInRight { from { opacity: 0; transform: translateX(50px); } to { opacity: 1; transform: translateX(0); } }

.container { max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; gap: 15px; padding-bottom: 40px; }
.panel { background: rgba(255,255,255,0.18); backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px); border: 1px solid rgba(255,255,255,0.45); border-radius: 28px; padding: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.18); }
.panel-title { font-size: 18px; font-weight: 900; margin-bottom: 15px; color: #fff; text-shadow: 0 1px 6px rgba(0,0,0,0.35); display: flex; justify-content: space-between; align-items: center; }

.input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
label { font-size: 11px; font-weight: bold; margin-bottom: 4px; display: block; color: #555; }
input, textarea { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 12px; font-size: 14px; box-sizing: border-box; }

.btn-main { width: 100%; background: linear-gradient(135deg, #42a95d 0%, #2e7d32 100%); color: white; border: none; padding: 15px; border-radius: 18px; font-weight: 900; font-size: 16px; cursor: pointer; box-shadow: 0 5px 18px rgba(46,125,50,0.35); transition: transform 0.15s, box-shadow 0.15s; letter-spacing: 0.5px; }
.btn-main:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(46,125,50,0.45); }
.btn-main:active { transform: scale(0.97) translateY(0); box-shadow: 0 3px 10px rgba(46,125,50,0.3); }

.btn-secondary { width: 100%; background: linear-gradient(135deg, #37474f 0%, #1c313a 100%); color: white; border: none; padding: 12px; border-radius: 14px; font-weight: 900; font-size: 14px; cursor: pointer; margin-top: 5px; box-shadow: 0 4px 14px rgba(0,0,0,0.2); transition: transform 0.15s, box-shadow 0.15s; }
.btn-secondary:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(0,0,0,0.28); }
.btn-secondary:active { transform: scale(0.97); }

.btn-qr { width: 100%; background: linear-gradient(135deg, #ffb300 0%, #e65100 100%); color: white; border: none; padding: 15px; border-radius: 18px; font-weight: 900; font-size: 16px; cursor: pointer; margin-top: 10px; display: flex; justify-content: center; align-items: center; gap: 10px; box-shadow: 0 5px 18px rgba(230,81,0,0.35); transition: transform 0.15s, box-shadow 0.15s; text-decoration: none; }
.btn-qr:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(230,81,0,0.45); }
.btn-qr:active { transform: scale(0.97); }

.farmer-log-item { background: #fff; border: 1px solid #eee; border-radius: 18px; padding: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.04); transition: box-shadow 0.2s; }
.farmer-log-item:hover { box-shadow: 0 4px 14px rgba(0,0,0,0.08); }
.btn-edit { background: linear-gradient(135deg, #29b6f6 0%, #0277bd 100%); color: white; border: none; padding: 7px 14px; border-radius: 10px; font-weight: 900; font-size: 12px; cursor: pointer; margin-right: 5px; box-shadow: 0 3px 8px rgba(2,119,189,0.3); transition: transform 0.15s; }
.btn-edit:hover { transform: scale(1.06); }
.btn-edit:active { transform: scale(0.95); }
.btn-delete { background: linear-gradient(135deg, #ef5350 0%, #b71c1c 100%); color: white; border: none; padding: 7px 14px; border-radius: 10px; font-weight: 900; font-size: 12px; cursor: pointer; box-shadow: 0 3px 8px rgba(183,28,28,0.3); transition: transform 0.15s; }
.btn-delete:hover { transform: scale(1.06); }
.btn-delete:active { transform: scale(0.95); }

.consumer-header { text-align: center; background: rgba(255,255,255,0.18); backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px); border: 1px solid rgba(255,255,255,0.45); padding: 20px; border-radius: 28px; box-shadow: 0 8px 32px rgba(0,0,0,0.18); }
.daily-card { background: rgba(255,255,255,0.15); backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px); border: 1px solid rgba(255,255,255,0.5); border-radius: 28px; padding: 20px; position: relative; overflow: hidden; box-shadow: 0 8px 32px rgba(0,0,0,0.15); }
.daily-badge { position: absolute; top: 0; right: 0; background: var(--accent-orange); color: white; padding: 5px 15px; border-radius: 0 0 0 20px; font-size: 12px; font-weight: 900; }
.log-item { background: rgba(255,255,255,0.15); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border-radius: 20px; padding: 15px; margin-bottom: 15px; border-left: 6px solid rgba(100,220,130,0.8); border-top: 1px solid rgba(255,255,255,0.4); }
.log-tag { background: rgba(66,169,93,0.35); color: #d0ffd8; padding: 2px 8px; border-radius: 5px; font-size: 11px; margin-right: 5px; font-weight: 900; border: 1px solid rgba(100,220,130,0.4); }

.lottery-panel { background: rgba(255,255,255,0.16); backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px); border: 1px solid rgba(255,200,100,0.5); border-radius: 28px; padding: 18px; box-shadow: 0 8px 32px rgba(0,0,0,0.18); }
.lottery-result { background: rgba(255,255,255,0.12); border-radius: 18px; padding: 14px; color: #fff; margin-top: 12px; font-size: 14px; min-height: 50px; display: flex; align-items: center; justify-content: center; text-align: center; font-weight: 900; border: 1px solid rgba(255,255,255,0.3); text-shadow: 0 1px 4px rgba(0,0,0,0.4); }
.gacha-svg-machine { width: 100%; max-width: 260px; margin: 0 auto; display: block; filter: drop-shadow(0 10px 24px rgba(0,0,0,0.18)); }
.gacha-button { width: 100%; margin-top: 16px; background: linear-gradient(135deg, #ffb300 0%, #f44336 100%); box-shadow: 0 6px 22px rgba(244,67,54,0.45); font-size: 18px; letter-spacing: 1.5px; border-radius: 20px !important; animation: gachaPulse 2.4s ease-in-out infinite; }
.gacha-button:hover { animation: none; transform: translateY(-2px); box-shadow: 0 10px 28px rgba(244,67,54,0.55); }
.gacha-button:active { transform: scale(0.96); animation: none; }
.gacha-button:disabled { animation: none; opacity: 0.7; }
@keyframes gachaPulse { 0%,100% { box-shadow: 0 6px 22px rgba(244,67,54,0.45); } 50% { box-shadow: 0 8px 30px rgba(244,67,54,0.7); } }

let isGachaSpinning = false;

function generateConsumerQR() {
  const qrDisplay = document.getElementById('qrCodeDisplay');
  const qrCanvas = document.getElementById('qrCodeCanvas');
  const consumerLink = document.getElementById('consumerLink');

  // 生成消費者頁面的連結（假設部署後的 URL）
  const baseUrl = window.location.origin + window.location.pathname;
  const consumerUrl = baseUrl + '?view=consumer';

  consumerLink.textContent = consumerUrl;

  // 清除之前的 QR Code
  qrCanvas.innerHTML = '';

  try {
    // 生成 QR Code
    QRCode.toCanvas(qrCanvas, consumerUrl, {
      width: 150,
      height: 150,
      colorDark: "#000000",
      colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.M
    }, function (error) {
      if (error) {
        console.error(error);
        qrCanvas.innerHTML = '<p style="color:red;">生成 QR Code 失敗</p>';
      } else {
        qrDisplay.style.display = 'block';
      }
    });
  } catch (error) {
    console.error('QRCode error:', error);
    qrCanvas.innerHTML = '<p style="color:red;">QR Code 庫載入失敗</p>';
    qrDisplay.style.display = 'block';
  }
}

function drawLotteryCharacter() {
  if (characterPool.length === 0) {
    document.getElementById('lotteryResult').innerText = "目前尚未有角色可抽。";
    return;
  }
  if (isGachaSpinning) return;

  isGachaSpinning = true;
  const button = document.getElementById('gachaButton');
  const result = document.getElementById('lotteryResult');
  button.disabled = true;
  button.innerText = '⏳ 轉動中...';
  result.innerText = '扭蛋機正在轉動，請稍後...';

  // Reset SVG state
  document.getElementById('resultCircle').setAttribute('opacity', '0');
  document.getElementById('resultImg').setAttribute('opacity', '0');
  document.getElementById('resultQuestion').setAttribute('opacity', '0');

  const balls = [
    { el: document.getElementById('ball1'), shine: document.getElementById('ball1shine'), bx: 88, by: 78 },
    { el: document.getElementById('ball2'), shine: document.getElementById('ball2shine'), bx: 152, by: 68 },
    { el: document.getElementById('ball3'), shine: document.getElementById('ball3shine'), bx: 120, by: 100 },
  ];
  balls.forEach(b => { b.el.setAttribute('opacity', '0.92'); b.shine.setAttribute('opacity', '1'); });

  let t = 0;
  const spinInterval = setInterval(() => {
    t += 0.18;
    balls.forEach((b, i) => {
      const dx = Math.sin(t + i * 2.1) * 26;
      const dy = Math.cos(t * 1.4 + i * 1.6) * 18;
      b.el.setAttribute('cx', b.bx + dx);
      b.el.setAttribute('cy', b.by + dy);
      b.shine.setAttribute('cx', b.bx + dx - 8);
      b.shine.setAttribute('cy', b.by + dy - 8);
    });
  }, 30);

  setTimeout(() => {
    clearInterval(spinInterval);
    balls.forEach(b => { b.el.setAttribute('opacity', '0'); b.shine.setAttribute('opacity', '0'); });

    const randomCharacter = characterPool[Math.floor(Math.random() * characterPool.length)];
    window._lastGachaChar = randomCharacter;

    document.getElementById('resultCircle').setAttribute('opacity', '1');
    const imgEl = document.getElementById('resultImg');

const seriesMap = {
  '台灣藍雀':'野生動物','萃谷行者':'野生動物','台灣獼猴':'野生動物',
  '台北樹蛙':'野生動物','熱果旅姬':'野生動物','石虎':'野生動物','帝雉':'野生動物',
  '鳳梨':'台灣農產','釋迦':'台灣農產','芒果':'台灣農產','蓮霧':'台灣農產',

  '洋蔥':'台灣農產','蒜頭':'台灣農產','蔥':'台灣農產','地瓜':'台灣農產',
  '木瓜':'台灣農產','洛神花':'台灣農產','茶葉':'台灣農產',

  '澆水壺':'農耕農具','復古澆水壺':'農耕農具','圓胖澆水壺':'農耕農具','帆布袋':'農耕農具',
};
const SERIES_ORDER = ['野生動物','台灣農產','農村配件','農耕農具'];
const SERIES_LABELS = {'野生動物':'🦁 野生動物','台灣農產':'🍎 台灣農產','農村配件':'🎩 農村配件','農耕農具':'🪣 農耕農具'};
let currentGalleryTab = '全部';

let gallery = JSON.parse(localStorage.getItem('skysef_gallery') || '[]');

function switchGalleryTab(btn) {
  currentGalleryTab = btn.dataset.series;
  document.querySelectorAll('.gallery-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGallery();
}

function addToGallery() {
  if (!window._lastGachaChar) return;
  const char = window._lastGachaChar;
  gallery.push({ name: char.name, img: char.img, series: seriesMap[char.name] || '其他' });
  localStorage.setItem('skysef_gallery', JSON.stringify(gallery));
  renderGallery();
  closeGachaModal();
}

function removeFromGallery(index) {
  gallery.splice(index, 1);
  localStorage.setItem('skysef_gallery', JSON.stringify(gallery));
  renderGallery();
}

function renderGalleryItem(item, i) {
  return `<div class="gallery-item">
    <button class="gallery-item-del" onclick="removeFromGallery(${i})">✕</button>
    <img src="${item.img}" alt="${item.name}" onerror="this.style.display='none';this.nextElementSibling.style.fontSize='32px'">
    <div class="gallery-item-name">${item.name}</div>
  </div>`;
}

function renderGallery() {
  const grid = document.getElementById('galleryGrid');
  const count = document.getElementById('galleryCount');
  count.innerText = gallery.length > 0 ? `(${gallery.length} 個)` : '';

  if (currentGalleryTab === '全部') {
    if (gallery.length === 0) {
      grid.innerHTML = '<div class="gallery-empty">尚未收集任何角色，快去抽扭蛋吧！🎰</div>';
      return;
    }
    const groups = {};
    gallery.forEach((item, i) => {
      const s = item.series || seriesMap[item.name] || '其他';
      if (!groups[s]) groups[s] = [];
      groups[s].push({ item, i });
    });
    let html = '';
    for (const s of [...SERIES_ORDER, '其他']) {
      if (!groups[s] || groups[s].length === 0) continue;
      html += `<div class="gallery-series-header">${SERIES_LABELS[s] || s} <span style="color:#aaa;font-weight:400;">(${groups[s].length})</span></div>`;
      html += groups[s].map(({ item, i }) => renderGalleryItem(item, i)).join('');
    }
    grid.innerHTML = html;
  } else {
    const filtered = gallery.map((item, i) => ({ item, i }))
      .filter(({ item }) => (item.series || seriesMap[item.name] || '其他') === currentGalleryTab);
    if (filtered.length === 0) {
      grid.innerHTML = '<div class="gallery-empty">此系列尚未收集到角色。</div>';
      return;
    }
    grid.innerHTML = filtered.map(({ item, i }) => renderGalleryItem(item, i)).join('');
  }
}

function initChart() {
if(lineChart) lineChart.destroy();
const ctx = document.getElementById('lineChart').getContext('2d');
const chartData = logs.slice(0, 6).reverse();

if(chartData.length === 0) {
  // 如果沒有資料，顯示提示
  ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
  ctx.fillStyle = '#666';
  ctx.font = '14px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('目前沒有監測數據', ctx.canvas.width / 2, ctx.canvas.height / 2);
  return;
}

try {
  lineChart = new Chart(ctx, {
  type: 'line',
  data: {
  labels: chartData.map(l => l.date.split(' ')[0]),
  datasets: [
  { label: '溫度', data: chartData.map(l => l.temp), borderColor: '#ff9800', tension: 0.3 },
  { label: '濕度', data: chartData.map(l => l.hum), borderColor: '#03a9f4', tension: 0.3 }
  ]
  },
  options: { responsive: true, maintainAspectRatio: false }
  });
} catch (error) {
  console.error('Chart.js error:', error);
  ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
  ctx.fillStyle = '#666';
  ctx.font = '14px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('圖表載入失敗', ctx.canvas.width / 2, ctx.canvas.height / 2);
}
}

const MUSIC_TRACKS = [
  { file: '01-Bilateral-Tranquility-Variation-1.mp3', name: 'Bilateral Tranquility' },
  { file: '04-Bilateral-Stillness (1).mp3',           name: 'Bilateral Stillness' },
  { file: '05-Bilateral-Eternal.mp3',                 name: 'Bilateral Eternal' },
  { file: 'DeeperMeaning.mp3',                        name: 'Deeper Meaning' },
];
let _musicAudio = null;
let _musicIndex = 0;
let _musicCollapsed = false;

function initMusicPlayer() {
  _musicAudio = new Audio(MUSIC_TRACKS[_musicIndex].file);
  _musicAudio.volume = 0.3;
  _musicAudio.addEventListener('ended', () => { _musicIndex = (_musicIndex + 1) % MUSIC_TRACKS.length; _loadTrack(); });
  _musicAudio.addEventListener('timeupdate', _updateProgress);
  _updateTrackUI();
  document.getElementById('musicProgress').style.display = 'block';
  _musicAudio.play().then(() => _setPlayBtn(true)).catch(() => _setPlayBtn(false));
}

function _loadTrack() {
  _musicAudio.src = MUSIC_TRACKS[_musicIndex].file;
  _updateTrackUI();
  _musicAudio.play().then(() => _setPlayBtn(true)).catch(() => _setPlayBtn(false));
}

function _updateTrackUI() {
  document.getElementById('musicTrackName').innerText = MUSIC_TRACKS[_musicIndex].name;
  document.getElementById('musicTrackSub').innerText = `第 ${_musicIndex + 1} / ${MUSIC_TRACKS.length} 首`;
}

function _setPlayBtn(playing) {
  document.getElementById('musicPlayBtn').innerText = playing ? '⏸' : '▶';
}

function _updateProgress() {
  if (!_musicAudio.duration) return;
  const pct = (_musicAudio.currentTime / _musicAudio.duration) * 100;
  document.getElementById('musicProgressFill').style.width = pct + '%';
}

function togglePlay() {
  if (!_musicAudio) return;
  if (_musicAudio.paused) { _musicAudio.play().then(() => _setPlayBtn(true)).catch(() => {}); }
  else { _musicAudio.pause(); _setPlayBtn(false); }
}

function musicPrev() {
  _musicIndex = (_musicIndex - 1 + MUSIC_TRACKS.length) % MUSIC_TRACKS.length;
  _loadTrack();
}

function musicNext() {
  _musicIndex = (_musicIndex + 1) % MUSIC_TRACKS.length;
  _loadTrack();
}

function seekMusic(e) {
  if (!_musicAudio || !_musicAudio.duration) return;
  const bar = e.currentTarget;
  const ratio = e.offsetX / bar.offsetWidth;
  _musicAudio.currentTime = ratio * _musicAudio.duration;
}

function toggleMusicPlayer() {
  _musicCollapsed = !_musicCollapsed;
  const bar = document.getElementById('musicBar');
  const info = document.getElementById('musicTrackInfo');
  const controls = bar.querySelector('.music-controls');
  const progress = document.getElementById('musicProgress');
  if (_musicCollapsed) {
    bar.classList.add('collapsed');
    info.style.display = 'none';
    controls.style.display = 'none';
    progress.style.display = 'none';
  } else {
    bar.classList.remove('collapsed');
    info.style.display = '';
    controls.style.display = '';
    progress.style.display = 'block';
  }
}


// ── Firebase 整合 ─────────────────────────────────────────
let _fbDb = null;
(function initFirebase() {
  try {
    if (window.SKYSER_FIREBASE_CONFIG && firebase) {
      if (!firebase.apps.length) firebase.initializeApp(window.SKYSER_FIREBASE_CONFIG);
      _fbDb = firebase.firestore();
      window.SKYSER_DB = _fbDb;
      loadFarmDataFromFirebase();
    }
  } catch(e) { /* Firebase not available, use localStorage */ }
})();

async function loadFarmDataFromFirebase() {
  if (!_fbDb) return;
  try {
    // Load farm profile
    const profileSnap = await _fbDb.collection('settings').doc('profile').get();
    if (profileSnap.exists) {
      const p = profileSnap.data();
      if (p.location) { farmProfile.location = p.location; }
      if (p.farmer)   { farmProfile.farmer   = p.farmer;   }
      updateProfileDisplay();
    }
    // Load farm logs
    const logsSnap = await _fbDb.collection('logs').orderBy('timestamp', 'desc').limit(20).get();
    if (!logsSnap.empty) {
      logs = logsSnap.docs.map(d => {
        const data = d.data();
        return {
          date: data.date || new Date(data.timestamp?.toDate?.() || Date.now()).toLocaleString('zh-TW', {month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}),
          type: data.type || data.cropType || '未知作物',
          name: data.name || data.batchId || '批次',
          temp: data.temp || 0,
          hum:  data.hum  || 0,
          ph:   data.ph   || '--',
          note: data.note || ''
        };
      });
      renderResume();
      initChart();
    }
    // Load plant photo
    const photoSnap = await _fbDb.collection('settings').doc('photo').get();
    if (photoSnap.exists && photoSnap.data().url) {
      const url = photoSnap.data().url;
      document.getElementById('photoDisplayConsumer').innerHTML = `<img src="${url}" style="max-width:100%;max-height:180px;border-radius:15px;">`;
    }
  } catch(e) { console.log('Firebase load failed, using local data:', e.message); }
}

window.onload = function() {
  updateProfileDisplay();
  renderGallery();
  const savedPhoto = localStorage.getItem('puli_plant_photo');
  if (savedPhoto) {
    document.getElementById('photoDisplayConsumer').innerHTML = `<img src="${savedPhoto}" style="max-width:100%;max-height:180px;border-radius:15px;">`;
  }
  initMusicPlayer();
  const urlParams = new URLSearchParams(window.location.search);
  const viewParam = urlParams.get('view');
  const hash = window.location.hash.replace('#', '');
  if (viewParam === 'consumer' || hash === 'consumer') {
    switchView('viewConsumer');
  } else if (viewParam === 'farmer' || hash === 'farmer') {
    switchView('viewFarmer');
  } else {
    switchView('viewConsumer');
  }
};
